<style>
body {
  background: white;
  text-align: center;
  font-family: Arial;
}

button {
  display: block;
  margin: 15px auto;
  padding: 15px;
  font-size: 20px;
  border: none;
  cursor: pointer;
}

.clicked {
  background: red;
  color: white;
}
</style>

<script>
let answers = {};

function pick(questionNumber, choice, button) {
  let allButtons = document.querySelectorAll("button");

  if (answers[questionNumber] == choice) {
    button.classList.remove("clicked");
    delete answers[questionNumber];
  }

  else {
    answers[questionNumber] = choice;

    if (questionNumber == 1) {
      allButtons[0].classList.remove("clicked");
      allButtons[1].classList.remove("clicked");
      allButtons[2].classList.remove("clicked");
    }

    if (questionNumber == 2) {
      allButtons[3].classList.remove("clicked");
      allButtons[4].classList.remove("clicked");
      allButtons[5].classList.remove("clicked");
    }

    if (questionNumber == 3) {
      allButtons[6].classList.remove("clicked");
      allButtons[7].classList.remove("clicked");
      allButtons[8].classList.remove("clicked");
    }

    if (questionNumber == 4) {
      allButtons[9].classList.remove("clicked");
      allButtons[10].classList.remove("clicked");
      allButtons[11].classList.remove("clicked");
    }

    if (questionNumber == 5) {
      allButtons[12].classList.remove("clicked");
      allButtons[13].classList.remove("clicked");
      allButtons[14].classList.remove("clicked");
    }

    button.classList.add("clicked");
  }
}

function showResult() {
  if (Object.keys(answers).length < 5) {
    document.getElementById("resultText").innerHTML = "Please answer all 5 questions first!";
    return;
  }

  let a = 0;
  let b = 0;
  let c = 0;

  for (let question in answers) {
    if (answers[question] == "a") {
      a++;
    }

    if (answers[question] == "b") {
      b++;
    }

    if (answers[question] == "c") {
      c++;
    }
  }

  if (a >= b && a >= c) {
    document.getElementById("resultText").innerHTML = "You got: Damn Daniel";
    document.getElementById("resultImage").src = "DamnDaniel.jpeg";
  }

  else if (b >= a && b >= c) {
    document.getElementById("resultText").innerHTML = "You got: Harambe";
    document.getElementById("resultImage").src = "Harambe.jpeg";
  }

  else {
    document.getElementById("resultText").innerHTML = "You got: Illuminati Confirmed";
    document.getElementById("resultImage").src = "Illuminati.jpeg";
  }
}
</script>
